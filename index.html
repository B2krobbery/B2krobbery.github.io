<!DOCTYPE html>
<html>
<head>
    <title>B2krobbery</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: black;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 48px;
            margin: 0;
            text-shadow: 0 0 10px cyan;
        }

        h2 {
            color: cyan;
            margin-top: 5px;
            text-shadow: 0 0 5px cyan;
        }

        #typing {
            font-size: 18px;
            color: cyan;
            margin-top: 10px;
            height: 25px;
        }

        /* 🔥 UPGRADED CARD GLOW (ONLY CHANGE) */
        .card {
            background: rgba(255, 255, 255, 0.07);
            padding: 20px;
            margin: 25px auto;
            width: 320px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;

            border: 1px solid rgba(0,255,255,0.4);

            box-shadow:
                0 0 15px rgba(0,255,255,0.3),
                0 0 30px rgba(0,255,255,0.15);
        }

        .card:hover {
            transform: translateY(-5px);

            box-shadow:
                0 0 25px cyan,
                0 0 50px rgba(0,255,255,0.4);
        }

        a {
            color: cyan;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            color: white;
            text-shadow: 0 0 10px cyan;
        }

        .tag {
            display: inline-block;
            border: 1px solid cyan;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 20px;
            font-size: 13px;
            transition: 0.3s;
        }

        .tag:hover {
            background: cyan;
            color: black;
        }

        .what-text {
            display: block;
            color: cyan;
            margin: 6px 0;
            font-size: 14px;
            transition: 0.2s;
        }

        .what-text:hover {
            color: white;
            text-shadow: 0 0 10px cyan;
        }

        .focus-text {
            font-size: 14px;
            opacity: 0.85;
            line-height: 1.5;
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
    <h1>Visal Vijay</h1>
    <h2>B2krobbery</h2>

    <div id="typing"></div>

    <!-- Profiles -->
    <div class="card">
        <h3>Profiles</h3>
        <p><a href="https://github.com/B2krobbery">GitHub</a></p>
        <p><a href="https://www.instructables.com/member/visalvijay83/">Instructables</a></p>
    </div>

    <!-- What I Do -->
    <div class="card">
        <h3>What I Do</h3>
        <div class="what-text">Fixing Bugs</div>
        <div class="what-text">Building Projects</div>
        <div class="what-text">Open Source</div>
        <div class="what-text">Problem Solving</div>
        <div class="what-text">Learning by Building</div>
    </div>

    <!-- Focus -->
    <div class="card">
        <h3>Focus</h3>
        <p class="focus-text">
            Currently improving development skills by building projects, fixing real-world bugs,
            and contributing to open-source communities.
        </p>
    </div>

</div>

<script>
const text = "ELC Student | Builder | Open Source";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}
window.onload = typeEffect;

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speedX: (Math.random() - 0.5),
        speedY: (Math.random() - 0.5)
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "cyan";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
        if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
