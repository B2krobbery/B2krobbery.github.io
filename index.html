<!DOCTYPE html>
<html>
<head>
    <title>B2krobbery</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #0f2027, #000000);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
            text-shadow: 0 0 10px cyan;
        }

        h2 {
            color: cyan;
            text-shadow: 0 0 5px cyan;
        }

        p {
            font-size: 18px;
        }

        a {
            color: cyan;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            color: white;
            text-shadow: 0 0 10px cyan;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0,255,255,0.2);
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px cyan;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Hi, I'm Visal Vijay 👋</h1>
        <h2>B2krobbery</h2>

        <p>ELC Student | Open Source Contributor</p>

        <div class="card">
            <h3>💻 Profiles</h3>
            <p>
                <a href="https://github.com/B2krobbery">GitHub</a>
            </p>
            <p>
                <a href="https://www.instructables.com/member/visalvijay83/">Instructables</a>
            </p>
        </div>

        <div class="card">
            <h3>🚀 Interests</h3>
            <p>Engineering projects and innovation</p>
            <p>Open-source contribution</p>
            <p>Creative problem solving</p>
        </div>

    </div>

</body>
</html>
