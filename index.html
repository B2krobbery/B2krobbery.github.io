<!DOCTYPE html>
<html>
<head>
    <title>B2krobbery</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: black;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            margin-top: 100px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 50px;
            text-shadow: 0 0 10px cyan;
        }

        h2 {
            color: cyan;
            text-shadow: 0 0 5px cyan;
        }

        #typing {
            font-size: 20px;
            color: cyan;
            margin-top: 10px;
            height: 25px;
        }

        a {
            color: cyan;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            color: white;
            text-shadow: 0 0 10px cyan;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0,255,255,0.2);
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px cyan;
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
    <h1>Hi, I'm Visal Vijay 👋</h1>
    <h2>B2krobbery</h2>

    <div id="typing"></div>

    <div class="card">
        <h3>💻 Profiles</h3>
        <p><a href="https://github.com/B2krobbery">GitHub</a></p>
        <p><a href="https://www.instructables.com/member/visalvijay83/">Instructables</a></p>
    </div>

    <div class="card">
        <h3>🚀 Interests</h3>
        <p>Engineering projects and innovation</p>
        <p>Open-source contribution</p>
        <p>Creative problem solving</p>
    </div>
</div>

<script>
    // Typing effect
    const text = "ELC Student | Open Source Contributor";
    let i = 0;
    function typeEffect() {
        if (i < text.length) {
            document.getElementById("typing").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeEffect, 50);
        }
    }
    window.onload = typeEffect;

    // Particle background
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];

    for (let i = 0; i < 100; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speedX: (Math.random() - 0.5),
            speedY: (Math.random() - 0.5)
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "cyan";

        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();

            p.x += p.speedX;
            p.y += p.speedY;

            if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
            if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
        });

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
